<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STI Admin — Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="admin.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }

        .admin-login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .admin-login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: 0 8px 40px rgba(3, 54, 105, 0.08);
            animation: fadeUp 0.5s ease both;
        }

        .admin-login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
        }

        .admin-login-logo img {
            height: 60px;
            width: auto;
        }

        .admin-login-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(246, 134, 52, 0.1);
            border: 1px solid rgba(246, 134, 52, 0.25);
            border-radius: 20px;
            padding: 5px 16px;
            margin-bottom: 24px;
        }

        .admin-login-badge span {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--orange);
        }

        .admin-login-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--blue);
            text-align: center;
            margin-bottom: 6px;
        }

        .admin-login-sub {
            font-size: 13px;
            color: var(--text-md);
            text-align: center;
            margin-bottom: 28px;
        }

        .login-error {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            min-height: 20px;
            margin-bottom: 8px;
        }

        .login-btn {
            width: 100%;
            background: var(--blue);
            border: none;
            border-radius: var(--radius-xs);
            padding: 14px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }

        .login-btn:hover {
            background: var(--blue-mid);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .back-link a {
            color: var(--orange);
            font-weight: 500;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="admin-login-wrap">
        <div class="admin-login-card">
            <div class="admin-login-logo">
                <img src="STI_Logo-removebg-preview.png" alt="STI Assets Management" />
            </div>
            <div class="admin-login-badge">
                <span>🔐 Admin Portal</span>
            </div>
            <div class="admin-login-title">Admin Sign In</div>
            <div class="admin-login-sub">Restricted access — STI staff only</div>

            <form id="admin-login-form">
                <div class="sform-group">
                    <label>Admin Email</label>
                    <input type="email" id="admin-email" placeholder="admin@stiassets.com" />
                </div>
                <div class="sform-group">
                    <label>Password</label>
                    <input type="password" id="admin-password" placeholder="Enter admin password" />
                </div>
                <div class="login-error" id="admin-login-error"></div>
                <button type="submit" class="login-btn" id="admin-login-btn">Sign In</button>
            </form>

            <div class="back-link">
                <a href="login-page.html">← Back to Investor Login</a>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin-auth.js"></script>
    <script src="admin.js"></script>
</body>

</html>
