<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STI Assets Management — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="login-page">
        <div class="login-card">

            <div class="login-logo">
                <div class="logo-mark">
                    <img src="STI_Logo-removebg-preview.png" alt="STI Assets Management Logo" />
                </div>
            </div>

            <h2 class="login-title">Welcome back!</h2>
            <p class="login-subtitle">Sign in to access your portfolio statement</p>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password" />
                </div>
                <div>
                    <a href="forgot-password.html" class="forgotpassword">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn" id="login-btn">Sign In</button>
                <p class="login-error" id="login-error"></p>
                <div class="divider"><span>or</span></div>
                <p class="create">New Here? <a href="create-account.html">Create an Account</a></p>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="client-login.js"></script>
</body>

</html>
